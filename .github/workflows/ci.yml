name: CI

on:
  push:
    branches:
      - main
      - 'agent/**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        id: typescript
        continue-on-error: true
        run: npm run lint 2>&1 | tee typescript.log

      - name: Build
        id: build
        if: steps.typescript.outcome == 'success'
        continue-on-error: true
        run: npm run build 2>&1 | tee build.log

      - name: Tests
        id: tests
        if: steps.typescript.outcome == 'success' && steps.build.outcome == 'success'
        continue-on-error: true
        run: npm run test:run 2>&1 | tee tests.log

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-logs
          path: |
            typescript.log
            build.log
            tests.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Fail when validation failed
        if: steps.typescript.outcome != 'success' || steps.build.outcome == 'failure' || steps.tests.outcome == 'failure'
        run: exit 1
